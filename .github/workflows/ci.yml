name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Link twitter scraper
        run: |
          git clone --depth 1 https://github.com/mepuka/better-twitter-scraper.git ../better_twitter_scraper
          cd ../better_twitter_scraper && bun install && bun run build && bun link

      - run: bun install --frozen-lockfile

      - name: Resolve twitter scraper link
        run: bun link @pooks/twitter-scraper

      # Cache the tsgo incremental build info so warm runs on the same source
      # tree can skip most of the typecheck work. actions/checkout rewrites
      # file mtimes on every run, so this cache only pays off when source
      # content is unchanged (doc-only PRs, dependabot PRs, re-runs of the
      # same SHA). Source-touching PRs still pay the full cold cost.
      - uses: actions/cache@v4
        with:
          path: .cache/tsc
          key: tsbuildinfo-${{ runner.os }}-${{ hashFiles('bun.lock', 'tsconfig*.json') }}-${{ github.sha }}
          restore-keys: |
            tsbuildinfo-${{ runner.os }}-${{ hashFiles('bun.lock', 'tsconfig*.json') }}-
            tsbuildinfo-${{ runner.os }}-

      - name: Type check
        run: bun run typecheck

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Link twitter scraper
        run: |
          git clone --depth 1 https://github.com/mepuka/better-twitter-scraper.git ../better_twitter_scraper
          cd ../better_twitter_scraper && bun install && bun run build && bun link

      - run: bun install --frozen-lockfile

      - name: Resolve twitter scraper link
        run: bun link @pooks/twitter-scraper

      - name: Test
        run: bun run test

  deploy-staging:
    needs: [typecheck, test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: Build web assets
        run: bun run build:web:prod

      # Deploy order matters: the agent + ingest workers declare a [[services]]
      # binding to skygest-resolver-staging, so the resolver must exist first or
      # their deploys will fail with [code: 10143] "Service binding 'RESOLVER'
      # references Worker 'skygest-resolver-staging' which was not found."
      - name: Deploy resolver to staging
        run: bunx wrangler deploy --config wrangler.resolver.toml --env staging
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Deploy agent to staging
        run: bunx wrangler deploy --config wrangler.agent.toml --env staging
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Deploy ingest to staging
        run: bunx wrangler deploy --config wrangler.toml --env staging
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Apply D1 migrations
        run: |
          curl -sf --retry 3 --retry-delay 5 \
            -X POST \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $OPERATOR_SECRET" \
            https://skygest-bi-agent-staging.kokokessy.workers.dev/admin/ops/migrate
        env:
          OPERATOR_SECRET: ${{ secrets.OPERATOR_SECRET }}
