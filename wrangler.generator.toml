name = "skygest-generator"
main = "src/worker/generator.ts"
compatibility_date = "2024-04-03"

[vars]
FEED_DID = "did:plc:bvwqyqjl4vxaswxbqymiofzv"
ALG_FEED_DID = "did:plc:bvwqyqjl4vxaswxbqymiofzv"
PUBLIC_BSKY_API = "https://public.api.bsky.app"
JETSTREAM_ENDPOINT = "wss://jetstream1.us-east.bsky.network/subscribe"
FOLLOW_LIMIT = "100"
FEED_LIMIT = "150"
CONSENT_THRESHOLD = "5"

[[d1_databases]]
binding = "DB"
database_name = "skygest"
database_id = "b33d6089-883e-4f62-bcfd-3b30153e51e9"

[[kv_namespaces]]
binding = "FEED_CACHE"
id = "af35ca52a5934af0a64e9fcb004a2359"

[[queues.consumers]]
queue = "feed-gen"
max_batch_size = 10
max_batch_timeout = 5
max_retries = 5
