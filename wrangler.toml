name = "skygest-bi-ingest"
account_id = "af578620f2ff4eae2042c031be82f7e7"
main = "src/worker/filter.ts"
compatibility_date = "2026-04-28"

[observability]
enabled = true

[[workflows]]
name = "ingest-run"
binding = "INGEST_RUN_WORKFLOW"
class_name = "IngestRunWorkflow"

[[workflows]]
name = "enrichment-run"
binding = "ENRICHMENT_RUN_WORKFLOW"
class_name = "EnrichmentRunWorkflow"

[[services]]
binding = "RESOLVER"
service = "skygest-resolver"
entrypoint = "ResolverEntrypoint"

[[durable_objects.bindings]]
name = "EXPERT_POLL_COORDINATOR"
class_name = "ExpertPollCoordinatorDo"

[vars]
PUBLIC_BSKY_API = "https://public.api.bsky.app"
INGEST_SHARD_COUNT = "1"
DEFAULT_DOMAIN = "energy"
MCP_LIMIT_DEFAULT = "20"
MCP_LIMIT_MAX = "100"
GEMINI_VISION_MODEL = "gemini-2.5-flash"

[[d1_databases]]
binding = "DB"
database_name = "skygest"
database_id = "b33d6089-883e-4f62-bcfd-3b30153e51e9"

[[kv_namespaces]]
binding = "ONTOLOGY_KV"
id = "f9888501c4ad473db8ff49ecf069f9ed"

[[r2_buckets]]
binding = "TRANSCRIPTS_BUCKET"
bucket_name = "skygest-transcripts"

[[ai_search_namespaces]]
binding = "ENERGY_INTEL_SEARCH"
namespace = "energy-intel"
remote = true

[triggers]
crons = ["*/15 * * * *"]

[env.staging]
name = "skygest-bi-ingest-staging"

[env.staging.observability]
enabled = true

[[env.staging.workflows]]
name = "ingest-run"
binding = "INGEST_RUN_WORKFLOW"
class_name = "IngestRunWorkflow"

[[env.staging.workflows]]
name = "enrichment-run"
binding = "ENRICHMENT_RUN_WORKFLOW"
class_name = "EnrichmentRunWorkflow"

[[env.staging.services]]
binding = "RESOLVER"
service = "skygest-resolver-staging"
entrypoint = "ResolverEntrypoint"

[[env.staging.durable_objects.bindings]]
name = "EXPERT_POLL_COORDINATOR"
class_name = "ExpertPollCoordinatorDo"

[env.staging.vars]
PUBLIC_BSKY_API = "https://public.api.bsky.app"
INGEST_SHARD_COUNT = "1"
DEFAULT_DOMAIN = "energy"
MCP_LIMIT_DEFAULT = "20"
MCP_LIMIT_MAX = "100"
ENABLE_STAGING_OPS = "true"
ENABLE_DATA_REF_RESOLUTION = "true"
GEMINI_VISION_MODEL = "gemini-3-flash-preview"

[[env.staging.d1_databases]]
binding = "DB"
database_name = "skygest-staging"
database_id = "29a612d3-67c9-429d-93af-6e976681e7c8"

[[env.staging.kv_namespaces]]
binding = "ONTOLOGY_KV"
id = "f9888501c4ad473db8ff49ecf069f9ed"

[[env.staging.r2_buckets]]
binding = "TRANSCRIPTS_BUCKET"
bucket_name = "skygest-transcripts-staging"

[[env.staging.ai_search_namespaces]]
binding = "ENERGY_INTEL_SEARCH"
namespace = "energy-intel"
remote = true

[env.staging.triggers]
crons = []

# DO migration history (needed for Cloudflare to track class lifecycle)
[[migrations]]
tag = "v1"
new_classes = ["JetstreamIngestorDo"]

[[migrations]]
tag = "v2"
deleted_classes = ["JetstreamIngestorDo"]

[[migrations]]
tag = "v3"
new_sqlite_classes = ["JetstreamIngestorDoV2"]

[[migrations]]
tag = "v4"
deleted_classes = ["JetstreamIngestorDoV2"]

[[migrations]]
tag = "v5"
new_sqlite_classes = ["ExpertPollCoordinatorDo"]

# Verified against the live account on 2026-04-11:
# - only staging workers exist for the split ingest/agent pair
# - the only ExpertPollCoordinatorDo namespace belongs to
#   skygest-bi-ingest-staging
# - no ExpertPollCoordinatorDoIsolated namespace exists in the account
# If production workers are introduced later and the coordinator ever needs
# to move between scripts, plan a fresh transfer migration from that live
# state instead of reviving the old commented v6 sketch.
