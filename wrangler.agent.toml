name = "skygest-bi-agent"
account_id = "af578620f2ff4eae2042c031be82f7e7"
main = "src/worker/feed.ts"
compatibility_date = "2026-05-03"

[assets]
directory = "./dist"
not_found_handling = "single-page-application"
run_worker_first = ["/api/*", "/admin/*", "/mcp", "/health"]

[observability]
enabled = true

[version_metadata]
binding = "CF_VERSION_METADATA"

[[analytics_engine_datasets]]
binding = "REQUEST_METRICS"
dataset = "skygest_request_metrics"

[[services]]
binding = "INGEST_SERVICE"
service = "skygest-bi-ingest"
entrypoint = "EnrichmentEntrypoint"

[vars]
PUBLIC_BSKY_API = "https://public.api.bsky.app"
INGEST_SHARD_COUNT = "1"
DEFAULT_DOMAIN = "energy"
MCP_LIMIT_DEFAULT = "20"
MCP_LIMIT_MAX = "100"

[[d1_databases]]
binding = "DB"
database_name = "skygest"
database_id = "b33d6089-883e-4f62-bcfd-3b30153e51e9"

[[kv_namespaces]]
binding = "ONTOLOGY_KV"
id = "f9888501c4ad473db8ff49ecf069f9ed"

[[r2_buckets]]
binding = "TRANSCRIPTS_BUCKET"
bucket_name = "skygest-transcripts"

[[ai_search_namespaces]]
binding = "ENERGY_INTEL_SEARCH"
namespace = "energy-intel"
remote = true

[env.staging]
name = "skygest-bi-agent-staging"

[env.staging.assets]
directory = "./dist"
not_found_handling = "single-page-application"
run_worker_first = ["/api/*", "/admin/*", "/mcp", "/health"]

[env.staging.observability]
enabled = true

[env.staging.version_metadata]
binding = "CF_VERSION_METADATA"

[[env.staging.analytics_engine_datasets]]
binding = "REQUEST_METRICS"
dataset = "skygest_request_metrics_staging"

[[env.staging.services]]
binding = "INGEST_SERVICE"
service = "skygest-bi-ingest-staging"
entrypoint = "EnrichmentEntrypoint"

# Set with:
# bunx wrangler secret put OPERATOR_SECRET --config wrangler.agent.toml --env staging
[env.staging.vars]
PUBLIC_BSKY_API = "https://public.api.bsky.app"
INGEST_SHARD_COUNT = "1"
DEFAULT_DOMAIN = "energy"
MCP_LIMIT_DEFAULT = "20"
MCP_LIMIT_MAX = "100"
ENABLE_STAGING_OPS = "true"

[[env.staging.d1_databases]]
binding = "DB"
database_name = "skygest-staging"
database_id = "29a612d3-67c9-429d-93af-6e976681e7c8"

[[env.staging.kv_namespaces]]
binding = "ONTOLOGY_KV"
id = "f9888501c4ad473db8ff49ecf069f9ed"

[[env.staging.r2_buckets]]
binding = "TRANSCRIPTS_BUCKET"
bucket_name = "skygest-transcripts-staging"

[[env.staging.ai_search_namespaces]]
binding = "ENERGY_INTEL_SEARCH"
namespace = "energy-intel"
remote = true

[env.staging.triggers]
crons = ["*/2 * * * *"]

# Verified against the live account on 2026-04-11:
# the staging agent worker is deployed at migration tag v2 and does not bind
# EXPERT_POLL_COORDINATOR. Keep this delete history as-is; there is no
# agent-side transfer step recorded in the current account.
[[migrations]]
tag = "v1"
new_sqlite_classes = ["ExpertPollCoordinatorDo"]

[[migrations]]
tag = "v2"
deleted_classes = ["ExpertPollCoordinatorDo"]
