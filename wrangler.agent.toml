name = "skygest-bi-agent"
main = "src/worker/feed.ts"
compatibility_date = "2024-04-03"

[observability]
enabled = true

[vars]
PUBLIC_BSKY_API = "https://public.api.bsky.app"
JETSTREAM_ENDPOINT = "wss://jetstream1.us-east.bsky.network/subscribe"
INGEST_SHARD_COUNT = "1"
DEFAULT_DOMAIN = "energy"
MCP_LIMIT_DEFAULT = "20"
MCP_LIMIT_MAX = "100"
OPERATOR_AUTH_MODE = "access"
ACCESS_TEAM_DOMAIN = "example.cloudflareaccess.com"
ACCESS_AUD = "replace-me"

[[d1_databases]]
binding = "DB"
database_name = "skygest"
database_id = "b33d6089-883e-4f62-bcfd-3b30153e51e9"

[[durable_objects.bindings]]
name = "JETSTREAM_INGESTOR"
class_name = "JetstreamIngestorDoV2"
script_name = "skygest-bi-ingest"

[env.staging]
name = "skygest-bi-agent-staging"

# Set with:
# bunx wrangler secret put OPERATOR_SECRET --config wrangler.agent.toml --env staging
[env.staging.vars]
PUBLIC_BSKY_API = "https://public.api.bsky.app"
JETSTREAM_ENDPOINT = "wss://jetstream1.us-east.bsky.network/subscribe"
INGEST_SHARD_COUNT = "1"
DEFAULT_DOMAIN = "energy"
MCP_LIMIT_DEFAULT = "20"
MCP_LIMIT_MAX = "100"
OPERATOR_AUTH_MODE = "shared-secret"
ACCESS_TEAM_DOMAIN = "example.cloudflareaccess.com"
ACCESS_AUD = "replace-me"

[[env.staging.d1_databases]]
binding = "DB"
database_name = "skygest-staging"
database_id = "29a612d3-67c9-429d-93af-6e976681e7c8"

[[env.staging.durable_objects.bindings]]
name = "JETSTREAM_INGESTOR"
class_name = "JetstreamIngestorDoV2"
script_name = "skygest-bi-ingest-staging"
